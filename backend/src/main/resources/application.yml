spring:
  application:
    name: inspection-server

  datasource:
    url: jdbc:mysql://localhost:3306/inspection_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: ${DB_PASSWORD:your_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 개발 중: update / 운영: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

# 엣지 .env 의 MAX_ANGLE_ERROR_DEG 와 맞추면 "정렬 통과율"이 파이프라인과 일치한다.
inspection:
  fiducial:
    max-angle-error-deg: 3.0

logging:
  level:
    com.inspection: DEBUG
    org.springframework.web: INFO
